services:
  db:
    image: postgres:15
    container_name: dialyra-db
    restart: unless-stopped
    profiles: ["infra"]
    env_file:
      - ../.env
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "127.0.0.1:5433:5432"
    volumes:
      - dialyra_postgres_data:/var/lib/postgresql/data
    networks:
      dialyra-net:
        aliases:
          - db
          - dialyra-db

  redis:
    image: redis:7
    container_name: dialyra-redis
    restart: unless-stopped
    profiles: ["infra"]
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - dialyra_redis_data:/data
    networks:
      dialyra-net:
        aliases:
          - redis
          - dialyra-redis

  dialyra_flask:
    build:
      context: ..
      dockerfile: server/Dockerfile
    container_name: dialyra-flask
    restart: unless-stopped
    env_file:
      - ../.env
    ports:
      - "5001:5000"
    depends_on:
      db:
        condition: service_started
        required: false
      redis:
        condition: service_started
        required: false
    volumes:
      - ../:/app
      - ${DIALYRA_STORAGE_HOST_PATH:-../storage}:/storage
      - ${DIALYRA_STORAGE_HOST_PATH:-../storage}/audio:/data/audio
      - ${DIALYRA_STORAGE_HOST_PATH:-../storage}/audio-assets:/data/audio-assets
      - ${DIALYRA_STORAGE_HOST_PATH:-../storage}/recordings:/data/recordings
    networks:
      - dialyra-net

networks:
  dialyra-net:
    name: dialyra-net
    external: true

volumes:
  dialyra_postgres_data:
    name: dialyra_postgres_data
  dialyra_redis_data:
    name: dialyra_redis_data
