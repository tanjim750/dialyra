[outbound]
exten => _X.,1,NoOp(Outbound static media trial)
 same => n,Set(TARGET_NUMBER=${IF($["${TARGET_NUMBER}"=""]?${EXTEN}:${TARGET_NUMBER})})
 same => n,Set(DIAL_TRUNK=${IF($["${SIP_TRUNK_ENDPOINT}"=""]?bdwebs-endpoint:${SIP_TRUNK_ENDPOINT})})
 same => n,NoOp(Using trunk=${DIAL_TRUNK} number=${TARGET_NUMBER} playback=custom/welcome)
 ; Static trial: place call first, on answer play welcome audio then hangup.
 same => n,Dial(PJSIP/${TARGET_NUMBER}@${DIAL_TRUNK},30,U(dialyra-static-playback^s^1))
 same => n,Hangup()

[dialyra-ivr]
exten => s,1,NoOp(Dialyra IVR via FastAGI)
 same => n,AGI(agi://dialyra_fastagi:4573/ivr)
 same => n,Hangup()

[dialyra-static-playback]
exten => s,1,NoOp(Static IVR trial on answered outbound channel)
 same => n,Set(TRY_COUNT=0)
 same => n(loop),Playback(custom/welcome)
 same => n,Read(MENU_DIGIT,,1,,1,5)
 same => n,GotoIf($["${MENU_DIGIT}"="1"]?play_welcome)
 same => n,GotoIf($["${MENU_DIGIT}"="2"]?play_welcome2)
 same => n,GotoIf($["${MENU_DIGIT}"="3"]?end_call)
 same => n,Set(TRY_COUNT=$[${TRY_COUNT}+1])
 same => n,GotoIf($[${TRY_COUNT}<3]?loop:end_call)
 same => n(play_welcome),Playback(custom/welcome)
 same => n,Goto(loop)
 same => n(play_welcome2),Playback(custom/welcome2)
 same => n,Goto(loop)
 same => n(end_call),Hangup()
