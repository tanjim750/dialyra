[outbound]
exten => _X.,1,NoOp(Outbound static media trial)
 same => n,Set(TARGET_NUMBER=${IF($["${TARGET_NUMBER}"=""]?${EXTEN}:${TARGET_NUMBER})})
 same => n,Set(DIAL_TRUNK=${IF($["${SIP_TRUNK_ENDPOINT}"=""]?bdwebs-endpoint:${SIP_TRUNK_ENDPOINT})})
 same => n,Set(__TARGET_NUMBER=${TARGET_NUMBER})
 same => n,Set(__SIP_TRUNK_ENDPOINT=${DIAL_TRUNK})
 same => n,Set(__CALL_SESSION_ID=${CALL_SESSION_ID})
 same => n,Set(__BUSINESS_ID=${BUSINESS_ID})
 same => n,Set(__SIP_TRUNK_ID=${SIP_TRUNK_ID})
 same => n,Set(__CALL_LOG_UUID=${CALL_LOG_UUID})
 same => n,Set(__CALL_ACTION_ID=${CALL_ACTION_ID})
 same => n,Set(__FASTAGI_CALL_TOKEN=${FASTAGI_CALL_TOKEN})
 same => n,Set(__FLOW_ID=${FLOW_ID})
 same => n,Set(__FLOW_VERSION_ID=${FLOW_VERSION_ID})
 same => n,Set(__RETRY_COUNT=${RETRY_COUNT})
 same => n,Set(__RETRY_OF_CALL_SESSION_ID=${RETRY_OF_CALL_SESSION_ID})
 same => n,Set(CDR(userfield)=call_action_id=${CALL_ACTION_ID})
 same => n,NoOp(Using trunk=${DIAL_TRUNK} number=${TARGET_NUMBER} runtime=fastagi)
 ; Stable outbound path: place call first, run FastAGI on answered called channel.
 same => n,Dial(PJSIP/${TARGET_NUMBER}@${DIAL_TRUNK},30,U(dialyra-fastagi^s^1))
 same => n,Hangup()

[dialyra-ivr]
exten => s,1,NoOp(Dialyra IVR via FastAGI)
 same => n,AGI(agi://dialyra_fastagi:4573/ivr)
 same => n,Hangup()

[dialyra-fastagi]
exten => s,1,NoOp(FastAGI runtime on answered outbound channel)
 same => n,AGI(agi://dialyra_fastagi:4573/ivr)
 same => n,Return()
