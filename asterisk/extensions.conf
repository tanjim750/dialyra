[outbound]
exten => _X.,1,NoOp(Final Outbound Call)
 same => n,Set(DIAL_TRUNK=${IF($["${SIP_TRUNK_ENDPOINT}"=""]?bdwebs-endpoint:${SIP_TRUNK_ENDPOINT})})
 same => n,NoOp(Using SIP trunk endpoint: ${DIAL_TRUNK})
 same => n,Set(DIAL_HOST=${SIP_TRUNK_HOST})
 same => n,Set(DIAL_PORT=${IF($["${SIP_TRUNK_PORT}"=""]?5060:${SIP_TRUNK_PORT})})
 same => n,Set(DIAL_MODE=${IF($["${SIP_TRUNK_TYPE}"="ip"]?ip:endpoint)})
 same => n,NoOp(Trunk mode=${DIAL_MODE} host=${DIAL_HOST} port=${DIAL_PORT})
 same => n,GotoIf($["${DIAL_MODE}"="ip" & "${DIAL_HOST}"!=""]?ipdial)
 same => n,Dial(PJSIP/${EXTEN}@${DIAL_TRUNK})
 same => n,Goto(done)
 same => n(ipdial),Dial(PJSIP/${EXTEN}@${DIAL_TRUNK}/sip:${DIAL_HOST}:${DIAL_PORT})
 same => n(done),NoOp(Dial finished)
 same => n,Hangup()

[dialyra-ivr]
exten => s,1,NoOp(Dialyra IVR via FastAGI)
 same => n,AGI(agi://dialyra_fastagi:4573/ivr)
 same => n,Hangup()
