[outbound]
exten => _X.,1,NoOp(Outbound Call via FastAGI)
 same => n,Set(TARGET_NUMBER=${IF($["${TARGET_NUMBER}"=""]?${EXTEN}:${TARGET_NUMBER})})
 same => n,Set(DIAL_TRUNK=${IF($["${SIP_TRUNK_ENDPOINT}"=""]?bdwebs-endpoint:${SIP_TRUNK_ENDPOINT})})
 same => n,NoOp(Using SIP trunk endpoint: ${DIAL_TRUNK})
 same => n,AGI(agi://dialyra_fastagi:4573/ivr)
 ; Safety fallback: if FastAGI returns without completing terminal call flow, dial directly.
 same => n,Dial(PJSIP/${TARGET_NUMBER}@${DIAL_TRUNK},30)
 same => n,Hangup()

[dialyra-ivr]
exten => s,1,NoOp(Dialyra IVR via FastAGI)
 same => n,AGI(agi://dialyra_fastagi:4573/ivr)
 same => n,Hangup()
