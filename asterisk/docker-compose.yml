services:
  db:
    image: postgres:15
    container_name: dialyra-db
    restart: unless-stopped
    profiles: ["infra"]
    env_file:
      - ../.env
    environment:
      POSTGRES_DB: ${DB_NAME:-dialyra_db}
      POSTGRES_USER: ${DB_USER:-dialyra_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-dialyra_pass}
    ports:
      - "127.0.0.1:5433:5432"
    volumes:
      - dialyra_postgres_data:/var/lib/postgresql/data
    networks:
      dialyra-net:
        aliases:
          - db
          - dialyra-db

  redis:
    image: redis:7
    container_name: dialyra-redis
    restart: unless-stopped
    profiles: ["infra"]
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - dialyra_redis_data:/data
    networks:
      dialyra-net:
        aliases:
          - redis
          - dialyra-redis

  dialyra_asterisk:
    build:
      context: ..
      dockerfile: asterisk/Dockerfile
    container_name: dialyra-asterisk
    restart: unless-stopped
    ports:
      - "5060:5060/udp"
      - "5060:5060/tcp"
      - "127.0.0.1:5038:5038"
      - "10000-10100:10000-10100/udp"
    volumes:
      - ../asterisk/extensions.conf:/etc/asterisk/extensions.conf
      - ../asterisk/pjsip.conf:/etc/asterisk/pjsip.conf
      - ../asterisk/manager.conf:/etc/asterisk/manager.conf
      - ../asterisk/ari.conf:/etc/asterisk/ari.conf
      - ../asterisk/realtime.conf:/etc/asterisk/realtime.conf
      - ../asterisk/sorcery.conf:/etc/asterisk/sorcery.conf
      - ../asterisk/extconfig.conf:/etc/asterisk/extconfig.conf
      - ../asterisk/res_pgsql.conf:/etc/asterisk/res_pgsql.conf
      - ../storage/audio:/var/lib/asterisk/sounds/custom
      - ../storage/recordings:/var/spool/asterisk/monitor
    depends_on:
      db:
        condition: service_started
        required: false
      redis:
        condition: service_started
        required: false
    networks:
      - dialyra-net

networks:
  dialyra-net:
    name: dialyra-net
    external: true

volumes:
  dialyra_postgres_data:
    name: dialyra_postgres_data
  dialyra_redis_data:
    name: dialyra_redis_data
